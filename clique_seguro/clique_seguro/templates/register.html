{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 py-8">
    <div class="max-w-2xl w-full">
        
        <a href="{% url 'home' %}" class="mb-6 bg-white text-gray-700 hover:bg-gray-100 px-6 py-4 rounded-xl font-bold transition-all flex items-center gap-3 text-lg shadow-lg w-fit">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6">
                <path d="m12 19-7-7 7-7"/>
                <path d="M19 12H5"/>
            </svg>
            Voltar
        </a>

        <div class="{% if high_contrast %}bg-gray-900 border-4 border-white{% else %}bg-white{% endif %} rounded-3xl p-10 sm:p-14 shadow-2xl">
            <div class="text-center mb-10">
                <div class="flex justify-center mb-6">
                    <div class="{% if high_contrast %}bg-white text-black{% else %}bg-gradient-to-br from-green-600 to-emerald-600 text-white{% endif %} rounded-full p-6">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="w-16 h-16">
                            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
                            <circle cx="9" cy="7" r="4"/>
                            <line x1="19" y1="8" x2="19" y2="14"/>
                            <line x1="22" y1="11" x2="16" y2="11"/>
                        </svg>
                    </div>
                </div>
                <h1 class="text-4xl sm:text-5xl font-bold mb-4 {% if high_contrast %}text-white{% else %}text-gray-800{% endif %}">
                    Criar Conta
                </h1>
                <p class="text-xl sm:text-2xl {% if high_contrast %}text-gray-300{% else %}text-gray-600{% endif %}">
                    Registe-se para começar a aprender
                </p>
            </div>

            <form id="registerForm" method="POST" action="{% url 'register' %}" class="space-y-6">
                {% csrf_token %}
                
                <div>
                    <label for="username" class="block text-xl font-bold mb-3 {% if high_contrast %}text-white{% else %}text-gray-700{% endif %}">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6 inline mr-2"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        Nome de Utilizador
                    </label>
                    <input
                        id="username"
                        name="username"
                        type="text"
                        class="w-full px-6 py-5 text-xl border-4 rounded-xl focus:outline-none transition-all {% if high_contrast %}bg-black border-white text-white focus:border-yellow-400{% else %}bg-white border-gray-300 text-gray-900 focus:border-green-600{% endif %}"
                        placeholder="Escolha um nome"
                        required
                    />
                </div>

                <div>
                    <label for="email" class="block text-xl font-bold mb-3 {% if high_contrast %}text-white{% else %}text-gray-700{% endif %}">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6 inline mr-2"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                        E-mail
                    </label>
                    <input
                        id="email"
                        name="email"
                        type="email"
                        class="w-full px-6 py-5 text-xl border-4 rounded-xl focus:outline-none transition-all {% if high_contrast %}bg-black border-white text-white focus:border-yellow-400{% else %}bg-white border-gray-300 text-gray-900 focus:border-green-600{% endif %}"
                        placeholder="Digite o seu e-mail"
                        required
                    />
                </div>

                <div>
                    <label for="password" class="block text-xl font-bold mb-3 {% if high_contrast %}text-white{% else %}text-gray-700{% endif %}">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6 inline mr-2"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                        Palavra-passe
                    </label>
                    <input
                        id="password"
                        name="password"
                        type="password"
                        class="w-full px-6 py-5 text-xl border-4 rounded-xl focus:outline-none transition-all {% if high_contrast %}bg-black border-white text-white focus:border-yellow-400{% else %}bg-white border-gray-300 text-gray-900 focus:border-green-600{% endif %}"
                        placeholder="Escolha uma palavra-passe"
                        required
                    />
                </div>

                <div>
                    <label for="confirmPassword" class="block text-xl font-bold mb-3 {% if high_contrast %}text-white{% else %}text-gray-700{% endif %}">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6 inline mr-2"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                        Confirmar Palavra-passe
                    </label>
                    <input
                        id="confirmPassword"
                        name="confirmPassword"
                        type="password"
                        class="w-full px-6 py-5 text-xl border-4 rounded-xl focus:outline-none transition-all {% if high_contrast %}bg-black border-white text-white focus:border-yellow-400{% else %}bg-white border-gray-300 text-gray-900 focus:border-green-600{% endif %}"
                        placeholder="Digite novamente"
                        required
                    />
                </div>

                <button
                    type="submit"
                    class="w-full px-8 py-6 rounded-2xl text-2xl font-bold transition-all shadow-xl hover:scale-105 flex items-center justify-center gap-3 {% if high_contrast %}bg-yellow-400 text-black hover:bg-yellow-300{% else %}bg-gradient-to-r from-green-600 to-emerald-600 text-white hover:from-green-700 hover:to-emerald-700{% endif %}"
                >
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="w-8 h-8"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
                    Criar Conta
                </button>
            </form>

            <div class="mt-8 text-center">
