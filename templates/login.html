{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 py-8">
    <div class="max-w-md w-full">
        
        <a href="{% url 'home' %}" class="mb-6 bg-white text-gray-700 hover:bg-gray-100 px-6 py-4 rounded-xl font-bold transition-all flex items-center gap-3 text-lg shadow-lg w-fit">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6">
                <path d="m12 19-7-7 7-7"/>
                <path d="M19 12H5"/>
            </svg>
            Voltar
        </a>

        <div class="{% if high_contrast %}bg-gray-900 border-4 border-white{% else %}bg-white{% endif %} rounded-3xl p-10 sm:p-14 shadow-2xl">
            <div class="text-center mb-10">
                <div class="flex justify-center mb-6">
                    <div class="{% if high_contrast %}bg-white text-black{% else %}bg-gradient-to-br from-blue-600 to-purple-600 text-white{% endif %} rounded-full p-6">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="w-16 h-16">
                            <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                    </div>
                </div>
                <h1 class="text-4xl sm:text-5xl font-bold mb-4 {% if high_contrast %}text-white{% else %}text-gray-800{% endif %}">
                    Bem-vindo(a)!
                </h1>
                <p class="text-xl sm:text-2xl {% if high_contrast %}text-gray-300{% else %}text-gray-600{% endif %}">
                    Entre para continuar a aprender
                </p>
            </div>

            {% if error %}
            <div class="bg-red-50 border-l-8 border-red-500 p-6 rounded-r-xl mb-8">
                <p class="text-xl text-red-700 font-medium flex items-center gap-3">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-alert-circle"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>
                    {{ error }}
                </p>
            </div>
            {% endif %}

            <form method="POST" action="{% url 'login' %}" class="space-y-6">
                {% csrf_token %}
                
                <div>
                    <label for="email" class="block text-xl font-bold mb-3 {% if high_contrast %}text-white{% else %}text-gray-700{% endif %}">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6 inline mr-2"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        E-mail
                    </label>
                    <input
                        id="email"
                        name="email"
                        type="email"
                        value="{{ old_email }}"
                        class="w-full px-6 py-5 text-xl border-4 rounded-xl focus:outline-none transition-all {% if high_contrast %}bg-black border-white text-white focus:border-yellow-400{% else %}bg-white border-gray-300 text-gray-900 focus:border-blue-600{% endif %}"
                        placeholder="Escreva o seu e-mail"
                        required
                    />
                </div>

                <div>
                    <label for="password" class="block text-xl font-bold mb-3 {% if high_contrast %}text-white{% else %}text-gray-700{% endif %}">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6 inline mr-2"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                        Palavra-passe
                    </label>
                    <input
                        id="password"
                        name="password"
                        type="password"
                        class="w-full px-6 py-5 text-xl border-4 rounded-xl focus:outline-none transition-all {% if high_contrast %}bg-black border-white text-white focus:border-yellow-400{% else %}bg-white border-gray-300 text-gray-900 focus:border-blue-600{% endif %}"
                        placeholder="Escreva a sua palavra-passe"
                        required
                    />
                </div>

                <button
                    type="submit"
                    class="w-full px-8 py-6 rounded-2xl text-2xl font-bold transition-all shadow-xl hover:scale-105 flex items-center justify-center gap-3 {% if high_contrast %}bg-yellow-400 text-black hover:bg-yellow-300{% else %}bg-gradient-to-r from-blue-600 to-purple-600 text-white hover:from-blue-700 hover:to-purple-700{% endif %}"
                >
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="w-8 h-8"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
                    Entrar
                </button>
            </form>

            <div class="mt-8 text-center">
                <p class="text-lg mb-4 {% if high_contrast %}text-gray-300{% else %}text-gray-600{% endif %}">
                    Ainda não tem uma conta?
                </p>
                <a href="{% url 'register' %}" class="inline-block font-bold text-xl underline hover:no-underline transition-all {% if high_contrast %}text-yellow-400 hover:text-yellow-300{% else %}text-blue-600 hover:text-blue-700{% endif %}">
                    Criar uma conta
                </a>
            </div>
            <a href="{% url 'socialaccount_signup' %}?next=/" 
            class="btn bg-white text-gray-800 border">
            Entrar com Google
            </a>
        </div>
    </div>
</div>
{% endblock %}
