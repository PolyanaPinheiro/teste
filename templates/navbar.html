{% load static %}
<header class="sticky top-0 z-50 {% if high_contrast %}bg-black border-b-4 border-white{% else %}bg-white shadow-md{% endif %} px-4 sm:px-8 py-6">
    <div class="max-w-7xl mx-auto flex flex-wrap items-center justify-between gap-4">
        
        <a href="{% url 'home' %}" class="flex items-center gap-3 hover:opacity-80 transition-opacity">
            <img src="{% static '\img\logo.png' %}" 
            alt="Logo Click Seguro" 
            class="w-13 h-13 sm:w-20 sm:h-20 object-contain">
            <div>
                <h1 class="text-2xl sm:text-3xl font-bold {% if high_contrast %}text-white{% else %}text-gray-900{% endif %}">Clique Seguro</h1>
                <p class="text-sm sm:text-base {% if high_contrast %}text-white{% else %}text-gray-600{% endif %}">Aprenda sem medo e com segurança</p>
            </div>
        </a>

        <div class="flex items-center gap-2 sm:gap-3 flex-wrap">
            <button onclick="changeFontSize(-2)" class="{% if high_contrast %}bg-white text-black hover:bg-gray-300 disabled:bg-gray-700 disabled:text-gray-500{% else %}bg-blue-600 text-white hover:bg-blue-700 disabled:bg-gray-300 disabled:text-gray-400{% endif %} px-4 sm:px-6 py-3 sm:py-4 rounded-xl font-bold transition-all flex items-center gap-2 text-base sm:text-lg shadow-lg" aria-label="Diminuir tamanho do texto">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5 sm:w-6 sm:h-6"><circle cx="11" cy="11" r="8"/><line x1="21" x2="16.65" y1="21" y2="16.65"/><line x1="8" x2="14" y1="11" y2="11"/></svg>
                <span class="hidden sm:inline">A-</span>
            </button>

            <button onclick="changeFontSize(2)" class="{% if high_contrast %}bg-white text-black hover:bg-gray-300 disabled:bg-gray-700 disabled:text-gray-500{% else %}bg-blue-600 text-white hover:bg-blue-700 disabled:bg-gray-300 disabled:text-gray-400{% endif %} px-4 sm:px-6 py-3 sm:py-4 rounded-xl font-bold transition-all flex items-center gap-2 text-base sm:text-lg shadow-lg" aria-label="Aumentar tamanho do texto">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5 sm:w-6 sm:h-6"><circle cx="11" cy="11" r="8"/><line x1="21" x2="16.65" y1="21" y2="16.65"/><line x1="11" x2="11" y1="8" y2="14"/><line x1="8" x2="14" y1="11" y2="11"/></svg>
                <span class="hidden sm:inline">A+</span>
            </button>

            <a href="{% url 'toggle_contrast' %}" class="{% if high_contrast %}bg-white text-black hover:bg-gray-300{% else %}bg-purple-600 text-white hover:bg-purple-700{% endif %} px-4 sm:px-6 py-3 sm:py-4 rounded-xl font-bold transition-all flex items-center gap-2 text-base sm:text-lg shadow-lg" aria-label="Alternar alto contraste">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5 sm:w-6 sm:h-6"><circle cx="12" cy="12" r="10"/><path d="M12 18a6 6 0 0 0 0-12v12z"/></svg>
            <span class="hidden sm:inline">Contraste</span>
            </a>

           <button id="btn-read-text" onclick="toggleReadingMode()" class="{% if high_contrast %}bg-yellow-400 text-black hover:bg-yellow-300{% else %}bg-gradient-to-r from-green-500 to-emerald-500 text-white hover:from-green-600 hover:to-emerald-600{% endif %} px-4 sm:px-8 py-3 sm:py-4 rounded-xl font-bold transition-all flex items-center gap-2 text-base sm:text-lg shadow-lg" aria-label="Ativar leitura por voz">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5 sm:w-6 sm:h-6"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
                
                <span id="text-read-text" class="hidden sm:inline">Ler Texto</span>
            </button>

           {% if user.is_authenticated %}
            <a href="{% url 'user_progress' %}" class="{% if high_contrast %}bg-white text-black hover:bg-gray-300{% else %}bg-blue-100 text-blue-700 hover:bg-blue-200 border border-blue-200{% endif %} px-4 py-2 sm:px-6 sm:py-2.5 rounded-xl font-bold transition-all flex items-center gap-2 shadow-sm">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-user-check"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><polyline points="16 11 18 13 22 9"/></svg>
                Olá, {{ user.first_name }}
             </a>
            {% else %}
             <a href="{% url 'login' %}" class="{% if high_contrast %}bg-yellow-400 text-black hover:bg-yellow-300{% else %}bg-[#8b5cf6] text-white hover:bg-[#7c3aed]{% endif %} px-4 py-2 sm:px-6 sm:py-2.5 rounded-xl font-bold transition-all shadow-md flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-user"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                Entrar
            </a>
            {% endif %}
        </div>
    </div>
</header>
