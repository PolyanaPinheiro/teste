{% extends 'base.html' %}
{% load static %}

{% block content %}
<main class="max-w-xl mx-auto px-4 py-12 sm:py-20">
    
    <div class="bg-white rounded-3xl p-8 sm:p-12 shadow-xl border-2 border-gray-100">
        
        <div class="text-center mb-10">
            <div class="bg-green-100 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-green-600 lucide lucide-user-plus"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" x2="19" y1="8" y2="14"/><line x1="22" x2="16" y1="11" y2="11"/></svg>
            </div>
            <h1 class="text-4xl font-bold text-gray-800 mb-4">Criar Conta</h1>
            <p class="text-xl text-gray-600">É rápido, seguro e totalmente gratuito.</p>
        </div>

        {% if error %}
        <div class="bg-red-50 border-l-8 border-red-500 p-6 rounded-r-xl mb-8">
            <p class="text-xl text-red-700 font-medium flex items-center gap-3">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-alert-circle"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>
                {{ error }}
            </p>
        </div>
        {% endif %}

   <form method="POST" action="{% url 'register' %}" class="space-y-8">
        {% csrf_token %}
    
        <div>
            <label for="first_name" class="block text-2xl font-bold text-gray-700 mb-3">
                Como quer ser chamado?
            </label>
            <input type="text" id="first_name" name="first_name" required value="{{ old_name }}"
                class="w-full p-5 text-2xl border-4 border-gray-200 rounded-2xl focus:border-green-500 focus:outline-none transition-colors"
                placeholder="Ex: Maria, Avô João...">
        </div>

        <div>
            <label for="email" class="block text-2xl font-bold text-gray-700 mb-3">
                O seu E-mail
            </label>
            <input type="email" id="email" name="email" required value="{{ old_email }}"
                class="w-full p-5 text-2xl border-4 border-gray-200 rounded-2xl focus:border-green-500 focus:outline-none transition-colors"
                placeholder="Ex: maria@email.com">
            <p class="mt-2 text-gray-500 text-lg">Será usado para entrar na sua conta com segurança.</p>
        </div>

        <div>
            <label for="password" class="block text-2xl font-bold text-gray-700 mb-3">
                Crie uma Senha
            </label>
            <input type="password" id="password" name="password" required
                class="w-full p-5 text-2xl border-4 border-gray-200 rounded-2xl focus:border-green-500 focus:outline-none transition-colors"
                placeholder="Digite a sua senha secreta">
        </div>

        <div>
            <label for="confirm_password" class="block text-2xl font-bold text-gray-700 mb-3">
                Repita a Senha
            </label>
            <input type="password" id="confirm_password" name="confirm_password" required
                class="w-full p-5 text-2xl border-4 border-gray-200 rounded-2xl focus:border-green-500 focus:outline-none transition-colors"
                placeholder="Digite a senha novamente">
        </div>

        <button type="submit" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold text-2xl p-6 rounded-2xl shadow-lg transition-all mt-4 flex items-center justify-center gap-3">
            Criar a Minha Conta
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-arrow-right"><line x1="5" x2="19" y1="12" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </button>
    </form>

        <div class="mt-10 text-center border-t-2 border-gray-100 pt-8">
            <p class="text-xl text-gray-600">
                Já tem uma conta? 
                <a href="{% url 'login' %}" class="text-[#8b5cf6] font-bold hover:underline">Entrar aqui</a>
            </p>
        </div>

    </div>
</main>
{% endblock %}
